spring:
  application:
    name: invoice-app
  datasource:
    url: jdbc:h2:mem:invoicedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

paypal:
  api:
    base-url: https://api.sandbox.paypal.com/v2/payments
    client-id: AaBbCcDdEeFf1234567890-SANDBOX
    client-secret: EGnz7x9Rq5kVYmWzPf8bTcXuJhNdAs3oLpKi0jHg
    access-token: A21AAHk7mZ9Ej4vRpNqBxLs5cWdYfXg8hJiKlMnO

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
